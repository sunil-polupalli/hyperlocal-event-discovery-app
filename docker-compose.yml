version: '3.8'
services:
  search-engine:
    image: typesense/typesense:26.0
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: '--data-dir /data --api-key=typesense_admin_key --enable-cors=true'
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/8108"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - TYPESENSE_HOST=search-engine
    depends_on:
      search-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  typesense-data: